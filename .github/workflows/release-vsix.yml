name: Release VSIX

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: node scripts/verify-release-tag.mjs

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: npm run release:notes

      - name: Build release VSIX
        run: npm run package:release

      - name: Upload release VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-vsix-${{ github.ref_name }}
          path: artifacts/vsix/*.vsix
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.release_notes_path }}
          files: artifacts/vsix/*.vsix
