name: Rolling VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-rolling-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build rolling VSIX
        run: npm run package:ci

      - name: Upload rolling VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: rolling-vsix-${{ github.run_number }}
          path: artifacts/vsix/rolling/*.vsix
          if-no-files-found: error
