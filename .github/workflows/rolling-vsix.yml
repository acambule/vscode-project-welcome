name: Rolling VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-rolling-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build rolling VSIX
        id: build_rolling
        run: npm run package:ci

      - name: Upload rolling VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: rolling-vsix-${{ github.run_number }}
          path: artifacts/vsix/rolling/*.vsix
          if-no-files-found: error

      - name: Update rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: Rolling Build
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            This is the continuously updated rolling build from the `main` branch.

            It is intended for testing and preview purposes and is not an official stable release.

            Rolling version: `${{ steps.build_rolling.outputs.rolling_version }}`
            Source branch: `main`
            Workflow run: `${{ github.run_number }}`
            Commit: `${{ github.sha }}`
          files: artifacts/vsix/rolling/*rolling-latest.vsix
          overwrite_files: true
